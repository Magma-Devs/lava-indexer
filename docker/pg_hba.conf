# Dev pg_hba. Loopback uses trust so a host-side `psql -h 127.0.0.1`
# (via the compose port-forward) doesn't need a password. Every other
# client — including peer containers on the docker bridge network —
# MUST authenticate with scram-sha-256 against DB_PASSWORD.
#
# Do NOT use this for a publicly-reachable Postgres instance. Ship a
# pg_hba.prod.conf that enforces scram-sha-256 with an IP allow-list
# scoped to the orchestrator's known subnet, and never ship a 0.0.0.0/0
# rule of any kind in production.

local   all all                 trust
host    all all 127.0.0.1/32    trust
host    all all ::1/128         trust

# Compose default-bridge subnet ranges. Password auth required.
host    all all 172.16.0.0/12   scram-sha-256
host    all all 192.168.0.0/16  scram-sha-256
host    all all 10.0.0.0/8      scram-sha-256
