# Dev-only pg_hba. Uses trust on the Docker bridge network so services
# can connect without a password. Do NOT use this for a publicly-reachable
# Postgres instance — switch to scram-sha-256 + a real password.

local   all all                 trust
host    all all 127.0.0.1/32    trust
host    all all ::1/128         trust
host    all all 0.0.0.0/0       trust
host    all all ::/0            trust
