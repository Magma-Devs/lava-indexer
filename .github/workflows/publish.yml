name: Publish

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  publish-indexer:
    runs-on: ubuntu-latest
    environment: mainnet
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Check if image exists
        id: check
        run: |
          if aws ecr describe-images --repository-name lava-indexer --image-ids imageTag=${{ github.sha }} 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3
        if: steps.check.outputs.exists == 'false'

      - uses: docker/build-push-action@v6
        if: steps.check.outputs.exists == 'false'
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/lava-indexer:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/lava-indexer:latest
          cache-from: type=gha,scope=indexer
          cache-to: type=gha,scope=indexer,mode=max
