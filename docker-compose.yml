# Stable compose project name: Docker uses this for container + network +
# default-volume prefixes. Pinning it via PROJECT_NAME (set in .env) means
# the folder can be renamed without losing containers/state, and two stacks
# can coexist on one host by pointing at different names.
name: ${PROJECT_NAME:-lava-indexer}

services:
  postgres:
    build:
      context: ./docker
      dockerfile: postgres.Dockerfile
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./docker/pg_hba.conf:/etc/pg_hba_custom.conf
    environment:
      # Required — no default. Pick a strong value in .env. The bridge
      # pg_hba enforces scram-sha-256 against this same password.
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      POSTGRES_DB: ${DB_DATABASE:-postgres}
    shm_size: 1gb
    command:
      - postgres
      - -c
      - hba_file=/etc/pg_hba_custom.conf
      - -c
      - shared_preload_libraries=pg_cron
      - -c
      - cron.database_name=${DB_DATABASE:-postgres}
      - -c
      - shared_buffers=2GB
      - -c
      - effective_cache_size=6GB
      - -c
      - work_mem=64MB
      - -c
      - maintenance_work_mem=512MB
      - -c
      - wal_buffers=32MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - max_wal_size=4GB
      - -c
      - synchronous_commit=off
      - -c
      - max_connections=100
      - -c
      - random_page_cost=1.1
      - -c
      - default_toast_compression=lz4
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  indexer:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres: { condition: service_healthy }
    restart: unless-stopped
    ports:
      # Bind to loopback by default — the UI / /api/status / GraphQL proxy
      # are UNAUTHENTICATED and disclose endpoint URLs (which can carry
      # tokens), failure reasons, and per-handler row counts. Override
      # INDEXER_BIND=0.0.0.0 only when you've put a reverse proxy with auth
      # in front, or in a network where the host port is otherwise gated.
      - "${INDEXER_BIND:-127.0.0.1}:${INDEXER_PORT:-8080}:8080"
    environment:
      DB_HOST: postgres
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      DB_DATABASE: ${DB_DATABASE:-postgres}
      LAVA_RPC_ENDPOINT: ${LAVA_RPC_ENDPOINT:-}
    volumes:
      - ./config.yml:/app/config.yml:ro
      - ./aggregates:/app/aggregates:ro

  graphql:
    # PostGraphile v4 exposes a GraphQL API over the Postgres schema with
    # zero config. It auto-discovers app.*, including the materialised views
    # defined in aggregates/. --watch is nice in dev, drop --enhance-graphiql
    # in prod.
    #
    # Built from docker/postgraphile.Dockerfile which layers two plugins on
    # top of the stock image — see that file for the rationale. The plugin
    # package names are repeated in --append-plugins below.
    build:
      context: ./docker
      dockerfile: postgraphile.Dockerfile
    ports:
      - "${GRAPHQL_PORT:-3000}:5000"
    depends_on:
      postgres: { condition: service_healthy }
    restart: on-failure:10
    command:
      - "--connection"
      - "postgres://${DB_USER:-postgres}:${DB_PASSWORD:?DB_PASSWORD must be set in .env}@postgres:5432/${DB_DATABASE:-postgres}"
      - "--schema"
      - "app"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "5000"
      - "--cors"
      - "--enhance-graphiql"
      - "--dynamic-json"
      - "--no-setof-functions-contain-nulls"
      - "--no-ignore-rbac"
      - "--legacy-relations=omit"
      - "--append-plugins"
      - "postgraphile-plugin-connection-filter,@graphile/pg-aggregates"
      - "--watch"

volumes:
  # When present, the DATA_VOLUME env var names an external pre-existing
  # volume to reuse — lets us rename the compose project without losing
  # the indexer's on-disk state. Falls back to the default named volume
  # for fresh installs.
  postgres_data:
    name: ${DATA_VOLUME:-lava-indexer_postgres_data}
